<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CRM TreinaCons - Sistema de Gestão de Relacionamento com Clientes" />
  <title>CRM TreinaCons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>

<body>
  <div id="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-brand">
        <img src="/logo.png" alt="TreinaCons Logo" class="brand-logo">
      </div>
      <nav class="sidebar-nav">
        <a href="#/contacts" class="nav-item" data-page="contacts">
          <span class="nav-icon"><span class="material-symbols-outlined">group</span></span>
          <span class="nav-label">Contatos</span>
        </a>
        <a href="#/companies" class="nav-item" data-page="companies">
          <span class="nav-icon"><span class="material-symbols-outlined">corporate_fare</span></span>
          <span class="nav-label">Empresas</span>
        </a>
        <a href="#/funnels" class="nav-item" data-page="funnels">
          <span class="nav-icon"><span class="material-symbols-outlined">view_kanban</span></span>
          <span class="nav-label">Funis</span>
        </a>
        <a href="#/tasks" class="nav-item" data-page="tasks">
          <span class="nav-icon"><span class="material-symbols-outlined">check_circle</span></span>
          <span class="nav-label">Demandas</span>
        </a>
        <a href="#/analytics" class="nav-item" data-page="analytics">
          <span class="nav-icon"><span class="material-symbols-outlined">trending_up</span></span>
          <span class="nav-label">Analytics</span>
        </a>
        <a href="#/products" class="nav-item" data-page="products">
          <span class="nav-icon"><span class="material-symbols-outlined">inventory_2</span></span>
          <span class="nav-label">Produtos</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">TC</div>
          <div class="user-details" style="flex:1">
            <span class="user-name">TreinaCons</span>
            <span class="user-role">Vendedor(a)</span>
          </div>
          <button id="btn-logout" title="Sair"
            style="background:transparent;border:none;color:rgba(255,255,255,0.5);display:flex;align-items:center;padding:4px">
            <span class="material-symbols-outlined" style="font-size:20px">logout</span>
          </button>
        </div>
      </div>
    </aside>
    <main id="main-content" class="main-content" style="margin-left: 0;">
      <div id="page-content"></div>
    </main>
  </div>
  <div id="modal-root"></div>
  <div id="toast-container" class="toast-container"></div>
  <script type="module" src="/src/main.js"></script>
  <script type="module">
    import { supabase } from './src/supabase.js';
    document.getElementById('btn-logout')?.addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.hash = '#/login';
    });
  </script>
</body>

</html>
